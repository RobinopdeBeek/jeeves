<!DOCTYPE html>
<!--
  JEEVES board — throwaway prototype, shadcn default style (light/neutral).
  5 columns: Backlog · Define Feature · Implement Task · Human Review · Finalize
  Cards show a segmented progress bar + current step label.
  Clicking a card opens the issue page (issue.html#<id>) full-page.

  THREE card kinds, each with its own pipeline:
    feature          — Backlog → Define → Human Review → Finalize  (skips Implement)
                       Define's last step "Tasks" hands off to child task cards
    task-child       — Implement → Human Review  (generated by a feature; no Define/Finalize)
    task-standalone  — Implement → Human Review → Finalize  (from "Implement now →"; no Define)

  Blue border = needs you. Spinner = AI is running in the background.
  Card state lives in localStorage (see board-shared.js), shared with issue.html.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JEEVES Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="board.css?v=13" />
</head>
<body>
<div id="app"></div>

<script src="board-shared.js?v=14"></script>
<script>
  /* Board page: clicking a card navigates to the full-page issue view. */
  App.openCard = id => { location.href = 'issue.html#' + id; };

  function render() {
    document.getElementById('app').innerHTML = renderBoard();
  }

  render();
</script>
</body>
</html>
